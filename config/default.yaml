app:
  language: en
  mode: local
  log_level: INFO

audio:
  device: default
  channels: 1
  preferred_sample_rate: 16000
  block_ms: 30
  capture_queue_size: 32
  pre_roll_ms: 250
  max_segment_sec: 12

endpointing:
  engine: simple
  end_silence_ms: 700

stt:
  engine: cohere_mlx
  model_id: CohereLabs/cohere-transcribe-03-2026
  language: en
  punctuation: true

cleanup:
  enabled: true
  mode: local_llm
  remove_fillers: true
  fix_grammar: true
  context_size: 2

injection:
  mode: hybrid
  separator: "\n"
  append_terminal_punctuation: true
  restore_clipboard: true

hotkeys:
  start_stop: "alt+cmd+s"
  arm_target: "alt+cmd+a"
  retry_last_insert: "alt+cmd+r"
  pause_insertion: "alt+cmd+p"
